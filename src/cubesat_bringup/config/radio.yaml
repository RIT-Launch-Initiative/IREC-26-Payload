radio_node:
  ros__parameters:

    # LoRa primary profile
    lora_frequency_hz: 433000000
    lora_bandwidth_hz: 125000
    lora_spreading_factor: 9
    lora_coding_rate: 5
    lora_tx_power_dbm: 17
    lora_preamble_length: 8

    # SPI transport
    spi_device: "/dev/spidev1.0"
    spi_freq_hz: 8000000
    reset_pin: 4 # GPIO 4
    dio0_pin: 23 # GPIO 23

    # Fallback profile (used if primary fails to TX)
    fallback_spreading_factor: 12
    fallback_bandwidth_hz: 125000
    fallback_tx_power_dbm: 20
