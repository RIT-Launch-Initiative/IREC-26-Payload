radio_node:
  ros__parameters:

    # LoRa primary profile
    frequency_hz: 425450000
    bandwidth_hz: 125000
    spreading_factor: 9
    coding_rate: 5
    tx_power_dbm: -8
    # were using high power pretty sure
    # 
    # -17 to 14 for low power PA
    # -9 to +22 for high power PA
    preamble_length: 8

    # SPI transport
    spi_device: "/dev/spidev1.0"
    spi_speed_hz: 8000000
    reset_gpio: 6 # GPIO 6  (BCM)
    dio1_gpio: 23 # GPIO 23 (BCM)
    busy_gpio: 27 # GPIO 27 (BCM)

    # Fallback profile (used if primary fails to TX)
    fallback_spreading_factor: 12
    fallback_bandwidth_hz: 125000
    fallback_tx_power_dbm: 20
