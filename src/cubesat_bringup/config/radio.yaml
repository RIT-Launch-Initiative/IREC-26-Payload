radio_node:
  ros__parameters:

    # LoRa primary profile
    lora_frequency_hz: 915000000
    lora_bandwidth_hz: 125000
    lora_spreading_factor: 9
    lora_coding_rate: 5
    lora_tx_power_dbm: 28
    lora_preamble_length: 8

    # SPI transport
    spi_device: "/dev/spidev0.0"
    spi_freq_hz: 8000000
    reset_pin: 25 # TODO: Figure out real pins
    dio0_pin: 24

    # Fallback profile (used if primary fails to TX)
    fallback_spreading_factor: 12
    fallback_bandwidth_hz: 125000
    fallback_tx_power_dbm: 28
